version: '3.8'

services:
  tts-server:
    build:
      context: .
      dockerfile: Dockerfile.tts-server
    container_name: edge-tts-server
    ports:
      - "8765:8765"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
